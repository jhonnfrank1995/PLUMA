name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Un checkout con `path: pluma-engine` fija el nombre de carpeta del plugin
# (slug esperado por wp-env y por los scripts de empaquetado), sin depender
# del nombre del repositorio en GitHub.
env:
  PLUGIN_DIR: pluma-engine

jobs:
  calidad-php:
    name: Calidad PHP (lint · analyse · unit · audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ${{ env.PLUGIN_DIR }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Cache de Composer
        uses: actions/cache@v4
        with:
          path: ${{ env.PLUGIN_DIR }}/vendor
          key: composer-${{ hashFiles(format('{0}/composer.lock', env.PLUGIN_DIR)) }}
          restore-keys: composer-

      - name: composer install
        working-directory: ${{ env.PLUGIN_DIR }}
        run: composer install --no-interaction --no-progress

      - name: composer lint (PHPCS — WordPress-Extra + Security)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: composer lint

      - name: composer analyse (PHPStan nivel 8)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: composer analyse

      - name: composer test:unit (PHPUnit + Brain\Monkey)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: composer test:unit

      - name: composer audit (CVEs bloquean el build)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: composer audit

  calidad-js:
    name: Calidad JS (vitest · build · audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ${{ env.PLUGIN_DIR }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.PLUGIN_DIR }}/package-lock.json

      - name: npm ci
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm ci

      - name: npm test (Vitest — lógica pura del panel)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm test

      - name: npm run build (Vite — build de producción real, no dev server)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm run build

      - name: npm audit (CVEs bloquean el build)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm audit --omit=dev

      - name: Subir build/panel para el job de empaquetado
        uses: actions/upload-artifact@v4
        with:
          name: panel-build
          path: ${{ env.PLUGIN_DIR }}/build/panel
          include-hidden-files: true
          retention-days: 1

  integracion:
    name: Integración (wp-env — ciclo de vida contra WordPress real)
    runs-on: ubuntu-latest
    needs: [calidad-php, calidad-js]
    steps:
      - uses: actions/checkout@v4
        with:
          path: ${{ env.PLUGIN_DIR }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.PLUGIN_DIR }}/package-lock.json

      - name: composer install
        working-directory: ${{ env.PLUGIN_DIR }}
        run: composer install --no-interaction --no-progress

      - name: npm ci
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm ci

      - name: Descargar build/panel (la Sala de Máquinas debe existir para activar)
        uses: actions/download-artifact@v4
        with:
          name: panel-build
          path: ${{ env.PLUGIN_DIR }}/build/panel

      - name: wp-env start
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npx wp-env start

      - name: composer test:integration (CicloDeVidaTest contra WP real)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm run test:integration

      - name: wp-env stop
        if: always()
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npx wp-env stop

  empaquetado:
    name: Empaquetado (ZIP reproducible + smoke instalación + E2E)
    runs-on: ubuntu-latest
    needs: [calidad-php, calidad-js]
    steps:
      - uses: actions/checkout@v4
        with:
          path: ${{ env.PLUGIN_DIR }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.PLUGIN_DIR }}/package-lock.json

      - name: composer install (necesita PHP-Scoper de require-dev para empaquetar)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: composer install --no-interaction --no-progress

      - name: npm ci
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm ci

      - name: Descargar build/panel
        uses: actions/download-artifact@v4
        with:
          name: panel-build
          path: ${{ env.PLUGIN_DIR }}/build/panel

      - name: bin/build-zip (GOVERNANCE §5.2 — build reproducible)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: bash bin/build-zip "0.2.0-ci.${{ github.run_number }}"

      - name: Descomprimir el ZIP construido (fidelidad al artefacto real, no a la carpeta pre-zip)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          mkdir -p build/zip-contents
          unzip -q pluma-engine-*.zip -d build/zip-contents
          test -d build/zip-contents/pluma-engine

      - name: Apuntar wp-env SOLO al contenido del ZIP (no al código fuente montado)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          cat > .wp-env.override.json <<'EOF'
          { "plugins": ["./build/zip-contents/pluma-engine"] }
          EOF

      - name: wp-env start
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npx wp-env start

      - name: Smoke — activar el plugin instalado desde el ZIP
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npx wp-env run cli -- wp plugin activate pluma-engine

      - name: Smoke — el activador dejó capacidades y esquema reales
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          npx wp-env run cli -- wp eval 'var_dump( get_role( "administrator" )->has_cap( "pluma_configurar_motor" ) );' | grep -q 'bool(true)'
          npx wp-env run cli -- wp option get pluma_db_version | grep -q '0.2.0'

      - name: Instalar Playwright (navegadores)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npx playwright install --with-deps chromium

      - name: E2E — Sala de Máquinas visible tras activar
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm run test:e2e

      - name: Smoke — desactivar no borra datos
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          npx wp-env run cli -- wp plugin deactivate pluma-engine
          npx wp-env run cli -- wp option get pluma_db_version | grep -q '0.2.0'

      - name: Smoke — desinstalar conserva datos por defecto (uninstall.php)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          # --skip-delete: verificamos la LOGICA de uninstall.php (conservar
          # datos), no si Docker puede borrar archivos de un bind-mount
          # (WP_Filesystem en modo 'direct' es un problema de permisos del
          # entorno, no del plugin).
          npx wp-env run cli -- wp plugin uninstall pluma-engine --skip-delete
          npx wp-env run cli -- wp option get pluma_db_version | grep -q '0.2.0'

      - name: Subir reporte de Playwright si algo falló
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ env.PLUGIN_DIR }}/playwright-report
          retention-days: 7

      - name: wp-env stop
        if: always()
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npx wp-env stop

      - name: Subir el ZIP de distribución
        uses: actions/upload-artifact@v4
        with:
          name: pluma-engine-zip
          path: ${{ env.PLUGIN_DIR }}/pluma-engine-*.zip
          retention-days: 14
